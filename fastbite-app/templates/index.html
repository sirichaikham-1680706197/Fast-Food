<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastbite - Premium Fast Food</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-50 text-gray-800">

    <!-- Navbar -->
    <nav class="bg-white shadow-md sticky top-0 z-40">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <div class="flex items-center">
                    <span class="mr-2 text-2xl">🍔</span>
                    <span class="font-bold text-xl tracking-tight text-[#e32e2d]">FastBite</span>
                </div>

                <div class="flex items-center space-x-4">
                    <!-- Cart Button -->
                    <button onclick="toggleCart()" class="relative p-2 text-gray-600 hover:text-[#e32e2d] transition-colors">
                        <i class="fa-solid fa-cart-shopping text-xl"></i>
                        <span id="cart-badge" class="absolute top-0 right-0 inline-flex items-center justify-center px-[5px] py-[2px] text-[10px] font-bold leading-none text-white transform translate-x-1/4 -translate-y-1/4 bg-[#e32e2d] rounded-full hidden border border-white">0</span>
                    </button>

                    <!-- User Menu -->
                    <div class="relative group">
                        <button class="p-2 text-gray-600 hover:text-[#e32e2d] transition-colors flex items-center space-x-1">
                            <i class="fa-solid fa-user-circle text-xl"></i>
                            <span id="username-display" class="hidden sm:inline text-sm font-medium"></span>
                            <i class="fa-solid fa-chevron-down text-xs"></i>
                        </button>
                        
                        <!-- Dropdown Menu -->
                        <div class="absolute right-0 mt-0 w-48 bg-white rounded-lg shadow-lg opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200">
                            <div class="px-4 py-3 border-b border-gray-200">
                                <p class="text-sm text-gray-700">
                                    <span id="user-display-full" class="font-semibold">Not logged in</span>
                                </p>
                            </div>
                            <a href="/login" id="login-link" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                                <i class="fa-solid fa-sign-in-alt mr-2"></i>Login
                            </a>
                            <a href="/admin" id="admin-link" class="hidden block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 border-t">
                                <i class="fa-solid fa-chart-pie mr-2"></i>Admin Dashboard
                            </a>
                            <button onclick="handleLogout()" id="logout-btn" class="hidden w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 border-t">
                                <i class="fa-solid fa-sign-out-alt mr-2"></i>Logout
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <div class="bg-[#e32e2d] text-white py-16 relative overflow-hidden">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center relative z-10 flex flex-col items-center">
            <div class="flex items-center justify-center mb-4">
                <span class="text-4xl md:text-5xl mr-3">🍔</span>
                <h1 class="text-4xl md:text-5xl font-bold tracking-tight">Fast Food Menu</h1>
            </div>
            <p class="text-lg md:text-xl font-medium max-w-2xl mx-auto">คัดสรรวัตถุดิบชั้นดี ปรุงสดใหม่ทุกออเดอร์ พร้อมส่งความอร่อยถึงบ้านคุณ</p>
        </div>
    </div>

    <!-- Main Content -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Categories -->
        <div class="flex justify-center space-x-2 md:space-x-4 mb-10 mt-4 overflow-x-auto pb-2">
            <button class="category-btn active px-6 py-2 rounded-full text-sm font-bold bg-[#e32e2d] text-white transition-colors shadow-sm" data-category="all">ทั้งหมด</button>
            <button class="category-btn px-6 py-2 rounded-full text-sm font-bold bg-white text-gray-700 hover:bg-gray-50 border border-gray-200 transition-colors shadow-sm" data-category="burger"><span class="mr-1">🍔</span> เบอร์เกอร์</button>
            <button class="category-btn px-6 py-2 rounded-full text-sm font-bold bg-white text-gray-700 hover:bg-gray-50 border border-gray-200 transition-colors shadow-sm" data-category="snack"><span class="mr-1">🍟</span> ของทานเล่น</button>
            <button class="category-btn px-6 py-2 rounded-full text-sm font-bold bg-white text-gray-700 hover:bg-gray-50 border border-gray-200 transition-colors shadow-sm" data-category="steak"><span class="mr-1">🥩</span> สเต็ก</button>
            <button class="category-btn px-6 py-2 rounded-full text-sm font-bold bg-white text-gray-700 hover:bg-gray-50 border border-gray-200 transition-colors shadow-sm" data-category="spaghetti"><span class="mr-1">🍝</span> สปาเก็ตตี้</button>
            <button class="category-btn px-6 py-2 rounded-full text-sm font-bold bg-white text-gray-700 hover:bg-gray-50 border border-gray-200 transition-colors shadow-sm" data-category="drink"><span class="mr-1">🥤</span> เครื่องดื่ม</button>
        </div>

        <!-- Menu Grid -->
        <div id="menu-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 px-2 md:px-0">
            <!-- Loading indicator -->
            <div class="col-span-full text-center py-10 text-gray-500">
                <i class="fa-solid fa-spinner fa-spin text-3xl mb-2"></i>
                <p>Loading delicious menu...</p>
            </div>
        </div>
    </main>

    <!-- Cart Overlay -->
    <div id="cart-drawer" class="fixed inset-0 overflow-hidden z-50 hidden">
        <div class="absolute inset-0 bg-black bg-opacity-50 transition-opacity" onclick="toggleCart()"></div>
        <div class="absolute inset-y-0 right-0 flex max-w-full w-full md:w-96">
            <div class="w-full h-full bg-white shadow-xl flex flex-col modal-enter-active">
                <div class="px-4 py-6 bg-gray-50 border-b flex justify-between items-center">
                    <h2 class="text-xl font-bold text-gray-900">Your Cart</h2>
                    <button onclick="toggleCart()" class="text-gray-400 hover:text-gray-500">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                </div>
                
                <div class="flex-1 overflow-y-auto p-4" id="cart-items">
                    <!-- Cart items will be rendered here -->
                    <div class="text-center text-gray-500 py-10">Your cart is empty.</div>
                </div>

                <div class="border-t border-gray-200 p-4 bg-gray-50">
                    <div class="flex justify-between mb-2">
                        <span class="text-gray-600">Subtotal</span>
                        <span class="font-medium">฿<span id="cart-subtotal">0</span></span>
                    </div>
                    <div class="flex justify-between mb-4">
                        <span class="text-gray-600">Delivery Fee</span>
                        <span class="font-medium">฿<span id="cart-delivery">0</span></span>
                    </div>
                    <div class="flex justify-between mb-6 text-lg font-bold">
                        <span>Total</span>
                        <span class="text-orange-600">฿<span id="cart-total">0</span></span>
                    </div>
                    <button id="checkout-btn" class="w-full bg-orange-600 text-white px-4 py-3 rounded-lg font-bold text-lg hover:bg-orange-700 transition disabled:opacity-50 disabled:cursor-not-allowed">
                        Checkout
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Review Modal -->
    <div id="review-modal" class="fixed inset-0 z-50 flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black bg-opacity-50" onclick="closeReviewModal()"></div>
        <div class="bg-white rounded-xl shadow-2xl w-11/12 max-w-lg z-10 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="p-4 border-b flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold" id="review-modal-title">Reviews</h3>
                <button onclick="closeReviewModal()" class="text-gray-400 hover:text-gray-600">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="p-4 overflow-y-auto flex-1 bg-white" id="review-list">
                <!-- Reviews injected here -->
                <div class="text-center text-gray-500 py-4">Loading reviews...</div>
            </div>

            <div class="p-4 border-t bg-gray-50">
                <h4 class="font-semibold mb-2">Write a Review</h4>
                <div class="flex mb-2 text-2xl text-gray-300 star-rating" id="star-selector">
                    <i class="fa-solid fa-star" data-rating="1"></i>
                    <i class="fa-solid fa-star" data-rating="2"></i>
                    <i class="fa-solid fa-star" data-rating="3"></i>
                    <i class="fa-solid fa-star" data-rating="4"></i>
                    <i class="fa-solid fa-star" data-rating="5"></i>
                </div>
                <input type="hidden" id="selected-rating" value="0">
                <textarea id="review-comment" class="w-full border border-gray-300 rounded-lg p-2 focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none resize-none" rows="2" placeholder="Tell us what you think..."></textarea>
                <div class="mt-2 flex justify-end">
                    <button id="submit-review-btn" class="bg-orange-600 text-white px-4 py-2 rounded hover:bg-orange-700 transition-colors">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="/static/js/app.js"></script>
</body>
</html>
