<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FastBite - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gradient-to-br from-orange-50 via-red-50 to-orange-100 min-h-screen flex items-center justify-center">
    
    <!-- Background Decoration -->
    <div class="absolute top-0 left-0 w-96 h-96 bg-orange-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>
    <div class="absolute bottom-0 right-0 w-96 h-96 bg-red-200 rounded-full mix-blend-multiply filter blur-3xl opacity-30 animate-pulse"></div>

    <!-- Login Container -->
    <div class="relative z-10 w-full max-w-md mx-4">
        <!-- Logo Section -->
        <div class="text-center mb-8">
            <div class="flex items-center justify-center mb-4">
                <span class="text-5xl">🍔</span>
            </div>
            <h1 class="text-4xl font-bold text-gray-800 tracking-tight">
                Fast<span class="text-[#e32e2d]">Bite</span>
            </h1>
            <p class="text-gray-600 text-sm mt-2 font-medium">Restaurant Management System</p>
        </div>

        <!-- Login Form Card -->
        <div class="bg-white rounded-2xl shadow-2xl p-8 space-y-6">
            
            <!-- Form Header -->
            <div class="text-center">
                <h2 class="text-2xl font-bold text-gray-800 mb-1">Welcome Back</h2>
                <p class="text-gray-600 text-sm">Sign in to your account to continue</p>
            </div>

            <!-- Alert Messages -->
            <div id="alert-container"></div>

            <!-- Login Form -->
            <form id="login-form" class="space-y-5">
                
                <!-- Username Field -->
                <div class="space-y-2">
                    <label for="username" class="block text-sm font-semibold text-gray-700">
                        <i class="fa-solid fa-user mr-2 text-[#e32e2d]"></i>Username
                    </label>
                    <input 
                        type="text" 
                        id="username" 
                        name="username" 
                        required
                        placeholder="admin or guest"
                        class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-[#e32e2d] focus:outline-none transition-colors duration-200 font-medium"
                    />
                </div>

                <!-- Password Field -->
                <div class="space-y-2">
                    <label for="password" class="block text-sm font-semibold text-gray-700">
                        <i class="fa-solid fa-lock mr-2 text-[#e32e2d]"></i>Password
                    </label>
                    <div class="relative">
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required
                            placeholder="Enter your password"
                            class="w-full px-4 py-3 border-2 border-gray-200 rounded-lg focus:border-[#e32e2d] focus:outline-none transition-colors duration-200 font-medium"
                        />
                        <button 
                            type="button" 
                            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 transition-colors"
                            onclick="togglePasswordVisibility()"
                        >
                            <i class="fa-solid fa-eye" id="password-toggle-icon"></i>
                        </button>
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center space-x-2">
                    <input 
                        type="checkbox" 
                        id="remember" 
                        name="remember"
                        class="w-4 h-4 text-[#e32e2d] border-gray-300 rounded focus:ring-[#e32e2d]"
                    />
                    <label for="remember" class="text-sm text-gray-600 cursor-pointer">
                        Keep me signed in
                    </label>
                </div>

                <!-- Submit Button -->
                <button 
                    type="submit" 
                    class="w-full bg-gradient-to-r from-[#e32e2d] to-[#c7252a] text-white font-bold py-3 rounded-lg hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center space-x-2"
                >
                    <span>Sign In</span>
                    <i class="fa-solid fa-arrow-right" id="submit-icon"></i>
                </button>
            </form>

            <!-- Divider -->
            <div class="relative">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t-2 border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500 font-medium">Demo Credentials</span>
                </div>
            </div>

            <!-- Demo Credentials Info -->
            <div class="grid grid-cols-2 gap-4">
                <!-- Admin Account -->
                <div class="bg-gradient-to-br from-blue-50 to-blue-100 p-4 rounded-lg border border-blue-200">
                    <div class="flex items-center mb-2">
                        <i class="fa-solid fa-shield text-blue-600 mr-2 text-lg"></i>
                        <span class="font-semibold text-gray-800 text-sm">Admin</span>
                    </div>
                    <p class="text-xs text-gray-700">
                        <strong>Username:</strong> admin<br/>
                        <strong>Password:</strong> admin
                    </p>
                </div>

                <!-- Customer Account -->
                <div class="bg-gradient-to-br from-green-50 to-green-100 p-4 rounded-lg border border-green-200">
                    <div class="flex items-center mb-2">
                        <i class="fa-solid fa-user text-green-600 mr-2 text-lg"></i>
                        <span class="font-semibold text-gray-800 text-sm">Customer</span>
                    </div>
                    <p class="text-xs text-gray-700">
                        <strong>Username:</strong> guest<br/>
                        <strong>Password:</strong> guest
                    </p>
                </div>
            </div>

            <!-- Footer Links -->
            <div class="text-center space-y-2">
                <p class="text-sm text-gray-600">
                    Don't have an account?
                    <a href="/" class="text-[#e32e2d] font-semibold hover:underline">
                        Return to Store
                    </a>
                </p>
            </div>
        </div>

        <!-- Security Note -->
        <div class="mt-6 text-center text-xs text-gray-500 max-w-sm mx-auto flex items-center justify-center space-x-1">
            <i class="fa-solid fa-lock text-gray-400"></i>
            <span>Your login information is secure and encrypted</span>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <!-- Scripts -->
    <script src="/static/js/login.js"></script>
</body>
</html>
