<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fastbite - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-100 font-sans">
    
    <!-- Navbar -->
    <nav class="bg-gray-900 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <i class="fa-solid fa-chart-pie text-2xl text-orange-500 mr-3"></i>
                    <span class="font-bold text-xl tracking-wider">Fastbite Admin</span>
                </div>
                <div class="flex items-center">
                    <a href="/" class="text-gray-300 hover:text-white transition-colors text-sm flex items-center">
                        <i class="fa-solid fa-store mr-2"></i> View Store
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Dashboard -->
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Dashboard Overview</h1>
            <p class="text-gray-600 mt-1">Real-time store statistics and performance.</p>
        </div>

        <!-- KPI Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8" id="kpi-container">
            <!-- Loading placeholders -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 flex items-center justify-center text-gray-400">Loading...</div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 flex items-center justify-center text-gray-400">Loading...</div>
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 flex items-center justify-center text-gray-400">Loading...</div>
        </div>

        <!-- Chart Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-8">
            <!-- Chart Container -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Top 5 Best Selling Menu</h2>
                <div class="relative h-64 w-full">
                    <canvas id="topProductsChart"></canvas>
                </div>
            </div>

            <!-- Recent Orders -->
            <div class="bg-white rounded-xl shadow-sm p-6 border border-gray-200 flex flex-col h-full">
                <h2 class="text-xl font-bold text-gray-800 mb-4">Recent Orders</h2>
                <div class="overflow-y-auto flex-1 h-64 border rounded-lg">
                    <table class="min-w-full divide-y divide-gray-200">
                        <thead class="bg-gray-50 sticky top-0">
                            <tr>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Order ID</th>
                                <th scope="col" class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                                <th scope="col" class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase tracking-wider">Total</th>
                            </tr>
                        </thead>
                        <tbody id="orders-tbody" class="bg-white divide-y divide-gray-200">
                            <tr><td colspan="3" class="px-6 py-10 text-center text-gray-500">Loading orders...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div id="toast-container"></div>

    <script src="/static/js/admin.js"></script>
</body>
</html>
